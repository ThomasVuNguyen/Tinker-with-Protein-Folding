<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Tinker: ESMFold Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: 12px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 90%;
            max-width: 1200px;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (min-width: 900px) {
            .container {
                flex-direction: row;
                height: 70vh;
            }
        }

        .panel {
            background: var(--surface-color);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .input-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .viewer-panel {
            flex: 2;
            position: relative;
            overflow: hidden;
        }

        label {
            font-weight: 600;
            margin-bottom: 0.8rem;
            display: block;
            color: var(--text-primary);
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .controls {
            margin-top: 1.5rem;
        }

        button {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #viewer {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background-color: #1e293b;
            min-height: 400px;
        }
        
        .example-tags {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .example-tag {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
        }

        .example-tag:hover {
            background: rgba(255,255,255,0.2);
            color: var(--text-primary);
        }

        .error-msg {
            color: #ef4444;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        /* 3Dmol specific overrides */
        canvas {
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Protein Tinker</h1>
        <p class="subtitle">Powered by Meta ESMFold API & 3Dmol.js</p>
    </header>

    <div class="container">
        <div class="panel input-panel">
            <label for="sequenceInput">Amino Acid Sequence</label>
            <textarea id="sequenceInput" placeholder="Paste your FASTA or plain amino acid sequence here...&#10;&#10;Example: &#10;MKALIVLGLVLLSVTVQGKVFERCELARTLKRLGMDGYRGISLANWMCLAKWESGYNTRATNYNAGDRSTDYGIFQINSRYWCNDGKTPGAVNACHLSCSALLQDNIADAVACAKRVVRDPQGIRAWVAWRNRCQNRDVRQYVQGCGV" spellcheck="false"></textarea>
            
            <div class="example-tags">
                <span class="example-tag" onclick="loadExample('MKALIVLGLVLLSVTVQGKVFERCELARTLKRLGMDGYRGISLANWMCLAKWESGYNTRATNYNAGDRSTDYGIFQINSRYWCNDGKTPGAVNACHLSCSALLQDNIADAVACAKRVVRDPQGIRAWVAWRNRCQNRDVRQYVQGCGV')">Lysozyme</span>
                <span class="example-tag" onclick="loadExample('MEEPQSDPSVEPPLSQETFSDLWKLLPENNVLSPLPSQAMDDLMLSPDDIEQWFTEDPGPDEAPRMPEAAPPVAPAPAAPTPAAPAPAPSWPLSSSVPSQKTYQGSYGFRLGFLHSGTAKSVTCTYSPALNKMFCQLAKTCPVQLWVDSTPPPGTRVRAMAIYKQSQHMTEVVRRCPHHERCSDSDGLAPPQHLIRVEGNLRVEYLDDRNTFRHSVVVPYEPPEVGSDCTTIHYNYMCNSSCMGGMNRRPILTIITLEDSSGNLLGRNSFEVRVCACPGRDRRTEEENLRKKGEPHHELPPGSTKRALPNNTSSSPQPKKKPLDGEYFTLQIRGRERFEMFRELNEALELKDAQAGKEPGGSRAHSSHLKSKKGQSTSRHKKLMFKTEGPDSD')">p53 (Tumor Suppressor)</span>
            </div>

            <div class="controls">
                <button id="foldBtn" onclick="foldProtein()">Fold Protein</button>
                <div id="errorMsg" class="error-msg"></div>
            </div>
        </div>

        <div class="panel viewer-panel">
            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
                <div id="loadingText" style="font-weight: 600; letter-spacing: 1px;">Predicting Structure (ESMFold)...</div>
            </div>
            <div id="viewer"></div>
        </div>
    </div>

    <script>
        let viewer = null;

        $(document).ready(function() {
            // Initialize 3Dmol.js viewer
            let element = $('#viewer');
            viewer = $3Dmol.createViewer(element, { backgroundColor: '#1e293b' });
        });

        function loadExample(seq) {
            $('#sequenceInput').val(seq);
            $('#errorMsg').hide();
        }

        async function foldProtein() {
            const sequence = $('#sequenceInput').val().trim().replace(/\s+/g, '');
            const btn = $('#foldBtn');
            const loader = $('#loading');
            const errorMsg = $('#errorMsg');

            if (!sequence) {
                errorMsg.text("Please enter an amino acid sequence.").show();
                return;
            }
            if (!/^[ACDEFGHIKLMNPQRSTVWY]+$/i.test(sequence)) {
                errorMsg.text("Invalid sequence. Only standard amino acid letters allowed.").show();
                return;
            }

            errorMsg.hide();
            btn.prop('disabled', true);
            loader.addClass('active');

            try {
                // ESMFold REST API
                const url = `https://api.esmatlas.com/foldSequence/v1/pdb/`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: sequence
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const pdbData = await response.text();

                // Clear previous and load new data
                viewer.clear();
                viewer.addModel(pdbData, "pdb");
                
                // Set default style: cartoon representation colored by spectrum (N -> C terminus)
                viewer.setStyle({}, { cartoon: { color: 'spectrum' } });
                viewer.zoomTo();
                viewer.render();

                // Add nice spin effect on load
                viewer.spin("y", 0.5);
                setTimeout(() => {
                    viewer.spin(false);
                }, 3000);

            } catch (error) {
                console.error(error);
                errorMsg.text("Failed to fold protein: " + error.message).show();
            } finally {
                btn.prop('disabled', false);
                loader.removeClass('active');
            }
        }
    </script>
</body>
</html>
